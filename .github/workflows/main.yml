# 工作流名称（随便起，显示用）
name: 我的第一个自动化工作流

# 触发方式：手动点击按钮触发
on:
  workflow_dispatch:  # 关键：手动触发的核心配置

# 要执行的任务
jobs:
  # 任务名：hello-world（随便起）
  hello-world:
    # 运行环境：GitHub提供的免费Ubuntu服务器
    runs-on: ubuntu-latest
    # 任务步骤
    steps:
      # 步骤1：输出问候语（核心操作）
      - name: 输出欢迎信息
        run: echo "你好，这是我的第一个自动化工作流！"
